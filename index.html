<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. William Ultimate AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding-bottom: 100px;
        }

        .gold-text { color: #FFD700; }
        .gold-bg { background-color: #FFD700; }
        .gold-border { border-color: #FFD700; }

        .section-view { display: none; animation: fadeIn 0.4s ease-in; }
        .active-view { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 24px;
        }

        .mic-btn {
            width: 80px; height: 80px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; transition: 0.3s;
            border: 4px solid transparent;
        }

        .mic-listening {
            border-color: #FFD700;
            box-shadow: 0 0 20px #FFD700;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .receipt-thermal {
            background: white; color: black;
            padding: 30px; width: 320px;
            font-family: 'Courier New', monospace;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="p-6 border-b border-yellow-500/10 flex justify-between items-center bg-black sticky top-0 z-[100]">
        <div>
            <h1 style="font-family: 'Syncopate', sans-serif;" class="text-lg font-bold gold-text tracking-tighter">DR. WILLIAM</h1>
            <p id="view-indicator" class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">Smart System v6.0</p>
        </div>
        <div id="status-mic" class="text-[9px] font-bold text-gray-500 border border-gray-800 px-3 py-1 rounded-full">
            MIC: STANDBY
        </div>
    </header>

    <!-- Main Container -->
    <main class="p-4 max-w-lg mx-auto">

        <!-- DIAGNOSTICS (Inakusaidia kujua kama sauti inafanya kazi) -->
        <div id="diagnostic-msg" class="mb-4 p-3 bg-red-900/20 border border-red-500/50 rounded-xl text-[10px] text-red-200 hidden">
            <i class="fas fa-exclamation-triangle mr-2"></i> Browser yako haikubali sauti. Tumia Google Chrome.
        </div>

        <!-- 1. STOCK SECTION -->
        <div id="view-stock" class="section-view active-view">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase">Orodha ya Stoo</h2>
                <button onclick="toggleStockForm()" class="bg-white/5 px-4 py-2 rounded-lg text-xs gold-text font-bold">+ Bidhaa</button>
            </div>

            <!-- Manual Add Stock -->
            <div id="stock-form" class="glass-card p-5 mb-6 hidden animate-fadeIn">
                <input id="st-name" class="w-full bg-transparent border-b border-gray-800 p-2 mb-4 outline-none text-sm" placeholder="Jina la Bidhaa (Mf: Aloe Vera)">
                <input id="st-qty" type="number" class="w-full bg-transparent border-b border-gray-800 p-2 mb-4 outline-none text-sm" placeholder="Idadi">
                <input id="st-price" type="number" class="w-full bg-transparent border-b border-gray-800 p-2 mb-4 outline-none text-sm" placeholder="Bei ya Kuuza">
                <button onclick="saveStock()" class="w-full gold-bg text-black font-black py-3 rounded-xl uppercase text-xs">Hifadhi Bidhaa</button>
            </div>

            <div id="stock-list" class="space-y-3">
                <!-- Stock items -->
                <p class="text-center text-gray-600 py-10 text-xs italic">Stoo ni tupu. Tafadhali ongeza bidhaa kwanza.</p>
            </div>
        </div>

        <!-- 2. SALES SECTION -->
        <div id="view-sales" class="section-view">
            <h2 class="text-xl font-black uppercase mb-6">Fanya Mauzo (Sauti)</h2>
            
            <div class="glass-card p-10 text-center mb-6">
                <button onclick="startVoice('SALES')" id="btn-sales" class="mic-btn bg-stone-900 mx-auto mb-4 text-yellow-500">
                    <i class="fas fa-microphone"></i>
                </button>
                <p id="sales-prompt" class="text-sm text-gray-400">Gusa mic kisha sema unachouza...</p>
                <p id="sales-transcript" class="mt-4 text-xs gold-text font-mono italic"></p>
            </div>

            <div class="glass-card p-4">
                <p class="text-[9px] font-bold text-gray-600 uppercase mb-3">Mauzo ya Hivi Karibuni</p>
                <div id="sales-history" class="space-y-2"></div>
            </div>
        </div>

        <!-- 3. EXPENSES SECTION -->
        <div id="view-expenses" class="section-view">
            <h2 class="text-xl font-black uppercase mb-6">Matumizi</h2>
            <div class="glass-card p-10 text-center mb-6">
                <button onclick="startVoice('EXPENSE')" id="btn-expense" class="mic-btn bg-stone-900 mx-auto mb-4 text-white">
                    <i class="fas fa-wallet"></i>
                </button>
                <p class="text-sm text-gray-400">Sema matumizi (Mf: Maji ya elfu mbili)</p>
                <p id="expense-transcript" class="mt-4 text-xs gold-text font-mono italic"></p>
            </div>
        </div>

    </main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 left-0 w-full bg-black border-t border-white/5 h-20 flex justify-around items-center px-4 z-[200]">
        <button onclick="showView('stock')" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-boxes"></i><span class="text-[8px] font-bold uppercase">Stoo</span>
        </button>
        <button onclick="showView('sales')" class="flex flex-col items-center gap-1 text-yellow-500">
            <i class="fas fa-shopping-cart"></i><span class="text-[8px] font-bold uppercase">Mauzo</span>
        </button>
        <button onclick="showView('expenses')" class="flex flex-col items-center gap-1 text-gray-500">
            <i class="fas fa-hand-holding-usd"></i><span class="text-[8px] font-bold uppercase">Matumizi</span>
        </button>
    </nav>

    <!-- Receipt Modal -->
    <div id="modal-receipt" class="fixed inset-0 bg-black/95 z-[300] hidden flex items-center justify-center p-4">
        <div class="flex flex-col items-center">
            <div id="receipt-area" class="receipt-thermal mb-6 shadow-2xl">
                <!-- Receipt Content -->
            </div>
            <button onclick="downloadPDF()" class="w-full gold-bg text-black font-bold py-4 rounded-xl mb-3">CHAPISHA PDF</button>
            <button onclick="closeReceipt()" class="text-gray-400 text-xs underline">Funga Ukurasa</button>
        </div>
    </div>

    <script>
        // Database
        let db = JSON.parse(localStorage.getItem('dw_ultimate_db')) || { stock: {}, sales: [], expenses: [] };

        // Browser Diagnostics
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('diagnostic-msg').classList.remove('hidden');
        }

        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'sw-TZ';
            recognition.continuous = false;
            recognition.interimResults = false;
        }

        const synth = window.speechSynthesis;

        function showView(view) {
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(`view-${view}`).classList.add('active-view');
            document.getElementById('view-indicator').innerText = view + " MODE";
            
            // UI Color handling
            const btns = document.querySelectorAll('nav button');
            btns.forEach(b => b.classList.add('text-gray-500'));
            btns.forEach(b => b.classList.remove('text-yellow-500'));
            
            if (view === 'stock') { renderStock(); }
            if (view === 'sales') { renderSales(); }
        }

        // --- STOCK LOGIC ---
        function toggleStockForm() {
            document.getElementById('stock-form').classList.toggle('hidden');
        }

        function saveStock() {
            const name = document.getElementById('st-name').value.trim();
            const qty = parseInt(document.getElementById('st-qty').value);
            const price = parseInt(document.getElementById('st-price').value);

            if (name && qty && price) {
                db.stock[name.toLowerCase()] = { name, qty, price };
                saveDB();
                renderStock();
                toggleStockForm();
                speak(`Bidhaa ya ${name} imehifadhiwa.`);
                document.getElementById('st-name').value = '';
                document.getElementById('st-qty').value = '';
                document.getElementById('st-price').value = '';
            }
        }

        function renderStock() {
            const list = document.getElementById('stock-list');
            list.innerHTML = '';
            const items = Object.values(db.stock);
            if (items.length === 0) {
                list.innerHTML = `<p class="text-center text-gray-600 py-10 text-xs italic">Hakuna bidhaa stoo.</p>`;
                return;
            }
            items.forEach(item => {
                list.innerHTML += `
                    <div class="glass-card p-4 flex justify-between items-center border-l-4 border-yellow-500">
                        <div>
                            <p class="text-sm font-bold uppercase tracking-tight">${item.name}</p>
                            <p class="text-[10px] text-gray-500">Bei ya kila moja: TZS ${item.price.toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black">${item.qty}</p>
                            <p class="text-[8px] text-gray-600 uppercase">Zilizopo</p>
                        </div>
                    </div>
                `;
            });
        }

        // --- VOICE PROCESSING ---
        function startVoice(mode) {
            if (!recognition) return;
            
            recognition.start();
            document.getElementById('status-mic').innerText = "MIC: LISTENING...";
            document.getElementById('status-mic').style.color = "#FFD700";
            
            const btn = document.getElementById(mode === 'SALES' ? 'btn-sales' : 'btn-expense');
            btn.classList.add('mic-listening');

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                document.getElementById(mode === 'SALES' ? 'sales-transcript' : 'expense-transcript').innerText = `"${transcript}"`;
                
                if (mode === 'SALES') processSale(transcript);
                else processExpense(transcript);
            };

            recognition.onend = () => {
                btn.classList.remove('mic-listening');
                document.getElementById('status-mic').innerText = "MIC: STANDBY";
                document.getElementById('status-mic').style.color = "#666";
            };
        }

        function processSale(text) {
            let qty = extractNumber(text) || 1;
            let itemName = extractItemName(text);

            // Search for item in stock
            let matchKey = Object.keys(db.stock).find(key => itemName.includes(key) || key.includes(itemName));
            
            if (matchKey) {
                let item = db.stock[matchKey];
                if (item.qty >= qty) {
                    item.qty -= qty;
                    const total = qty * item.price;
                    const sale = { name: item.name, qty, price: item.price, total, date: new Date().toLocaleString() };
                    db.sales.unshift(sale);
                    saveDB();
                    renderSales();
                    speak(`Umeuza ${qty} za ${item.name}.`);
                    printReceipt(sale);
                } else {
                    speak(`Uwezo mdogo. Zimebaki ${item.qty} tu.`);
                }
            } else {
                speak(`Samahani Dr. William, sijaona ${itemName} kwenye stoo.`);
            }
        }

        function processExpense(text) {
            let amount = extractPrice(text);
            if (amount > 0) {
                const expense = { name: text, total: amount, date: new Date().toLocaleString() };
                db.expenses.unshift(expense);
                saveDB();
                speak(`Matumizi ya shilingi ${amount} yamehifadhiwa.`);
            }
        }

        // --- HELPERS ---
        function extractNumber(text) {
            const swNum = { "moja":1, "mbili":2, "tatu":3, "nne":4, "tano":5, "sita":6, "saba":7, "nane":8, "tisa":9, "kumi":10 };
            let match = text.match(/\d+/);
            if (match) return parseInt(match[0]);
            for (let key in swNum) { if (text.includes(key)) return swNum[key]; }
            return 1;
        }

        function extractPrice(text) {
            if (text.includes('elfu')) {
                let parts = text.split('elfu');
                let base = extractNumber(parts[0]) || 1;
                return base * 1000;
            }
            if (text.includes('laki')) {
                let parts = text.split('laki');
                let base = extractNumber(parts[0]) || 1;
                return base * 100000;
            }
            return extractNumber(text);
        }

        function extractItemName(text) {
            const filter = ["nimeuza", "mauzo", "uza", "shilingi", "elfu", "laki", "moja", "mbili", "za", "ya", "pisi"];
            let words = text.split(" ").filter(w => !filter.includes(w) && !w.match(/\d+/));
            return words.join(" ").trim();
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'sw-TZ';
            synth.speak(msg);
        }

        function saveDB() { localStorage.setItem('dw_ultimate_db', JSON.stringify(db)); }

        function renderSales() {
            const history = document.getElementById('sales-history');
            history.innerHTML = db.sales.slice(0, 5).map(s => `
                <div class="flex justify-between items-center text-[10px] border-b border-white/5 pb-2">
                    <span class="text-gray-400">${s.qty} x ${s.name}</span>
                    <span class="gold-text font-bold">TZS ${s.total.toLocaleString()}</span>
                </div>
            `).join('');
        }

        // --- RECEIPT ENGINE ---
        function printReceipt(data) {
            document.getElementById('receipt-area').innerHTML = `
                <div style="text-align:center; margin-bottom:20px;">
                    <h2 style="margin:0; font-weight:900;">DR. WILLIAM SERIES</h2>
                    <p style="font-size:10px; margin:0;">Tanzania</p>
                    <p style="font-size:9px;">${data.date}</p>
                </div>
                <div style="border-bottom:1px dashed #000; padding-bottom:10px; margin-bottom:10px;">
                    <p style="margin:5px 0;">KITU: ${data.name.toUpperCase()}</p>
                    <p style="margin:5px 0;">IDADI: ${data.qty}</p>
                    <p style="margin:5px 0;">BEI: ${data.price.toLocaleString()}</p>
                </div>
                <div style="text-align:right;">
                    <h3 style="margin:0;">JUMLA: TZS ${data.total.toLocaleString()}</h3>
                </div>
                <div style="margin-top:30px; text-align:center; font-size:9px; border-top:1px solid #eee; padding-top:10px;">
                    ASANTE KWA KUTUAMINI KARIBU TENA
                </div>
            `;
            document.getElementById('modal-receipt').classList.remove('hidden');
        }

        function closeReceipt() { document.getElementById('modal-receipt').classList.add('hidden'); }
        
        function downloadPDF() {
            const element = document.getElementById('receipt-area');
            html2pdf().from(element).save(`Risiti_${Date.now()}.pdf`);
        }

        // Initialize
        renderStock();
        renderSales();
    </script>
</body>
</html>
